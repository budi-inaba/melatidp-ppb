<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verifikasi Data PPB</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4 text-white">

  <div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-slate-800 shadow-2xl rounded-2xl p-6">

      <h1 class="text-2xl font-bold text-center mb-6">
        Verifikasi PPB
      </h1>

      <!-- Loading -->
      <div id="loading" class="text-center py-6">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-white mx-auto"></div>
        <p class="mt-4 text-sm text-slate-300">Memeriksa data...</p>
      </div>

      <!-- Result -->
      <div id="result" class="hidden space-y-3 text-sm"></div>

      <!-- Error -->
      <div id="error" class="hidden text-center text-red-400 text-sm py-4"></div>

    </div>

    <p class="text-center text-xs text-slate-400 mt-4">
      Program Pangan Bersubsidi 2026
    </p>

  </div>

<script>
/* ==============================
   KONFIGURASI API
================================= */
const API_URL = "https://script.google.com/macros/s/YOUR_DEPLOY_ID/exec";

/* ==============================
   HELPER
================================= */
function getQueryParam(name) {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(name);
}

function showError(message) {
  document.getElementById("loading").classList.add("hidden");
  const errorDiv = document.getElementById("error");
  errorDiv.textContent = message;
  errorDiv.classList.remove("hidden");
}

function showResult(data) {
  document.getElementById("loading").classList.add("hidden");

  const resultDiv = document.getElementById("result");
  resultDiv.classList.remove("hidden");

  const statusColor = data.status === "Disetujui"
    ? "text-green-400"
    : "text-yellow-400";

  resultDiv.innerHTML = `
    <div class="border-b border-slate-600 pb-2">
      <strong>ID:</strong> ${data.id}
    </div>
    <div>
      <strong>Nama:</strong> ${data.nama_pemilik}
    </div>
    <div>
      <strong>No KK:</strong> ${data.kk}
    </div>
    <div>
      <strong>Produk:</strong> ${data.produk}
    </div>
    <div class="${statusColor}">
      <strong>Status:</strong> ${data.status}
    </div>
  `;
}

/* ==============================
   MAIN
================================= */
async function verify() {

  const id = getQueryParam("id");

  if (!id) {
    showError("ID tidak ditemukan di URL");
    return;
  }

  try {

    const response = await fetch(
      `${API_URL}?action=getById&id=${id}`
    );

    const result = await response.json();

    if (!result.success) {
      showError("Data tidak ditemukan");
      return;
    }

    showResult(result);

  } catch (err) {
    showError("Gagal menghubungi server");
  }
}

verify();
</script>

</body>
</html>
